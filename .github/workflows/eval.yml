name: Eval

on:
  push:
    branches: [main]
    paths:
      - "apps/api/agents/**"
      - "apps/api/agents/prompts/**"
      - "packages/compliance-kb-mcp/src/**"
      - "packages/evidence-store-mcp/src/**"
      - "packages/questionnaire-mcp/src/**"
      - "packages/policy-template-mcp/src/**"
      - "packages/drift-watcher-mcp/src/**"
      - "packages/eval-harness/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/agents/**"
      - "apps/api/agents/prompts/**"
      - "packages/*/src/**"
      - "packages/eval-harness/**"

jobs:
  eval:
    name: Promptfoo Eval Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The Sprint 2 smoke suite dispatches to compliance_kb_mcp via a
      # hermetic Python `exec:` provider. Install the package itself (plus
      # its runtime deps: pydantic, mcp) so the provider can import it.
      - name: Install compliance-kb-mcp
        run: pip install -e packages/compliance-kb-mcp

      # ── Sprint 2 gate: 5 smoke evals over the 800-53 catalogue ────────────
      # Sprint 10 replaces this with the full Promptfoo + RAGAS + LLM-judge
      # suite gated on docs/evals/gold/ (>= 100 labelled cases) and a
      # validated LLM judge (TPR/TNR >= 0.85, kappa >= 0.70).
      - name: Run Promptfoo eval
        if: hashFiles('packages/eval-harness/promptfooconfig.yaml') != ''
        run: pnpm --filter @auditpilot/eval-harness eval:ci
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}

      - name: Placeholder (no config present)
        if: hashFiles('packages/eval-harness/promptfooconfig.yaml') == ''
        run: echo "No promptfooconfig.yaml present — placeholder passes."

      # ── Judge validation (Sprint 10) ───────────────────────────────────────
      # Thresholds: TPR >= 0.85, TNR >= 0.85, Cohen's kappa >= 0.70
      # Blocked on: docs/evals/judge_validation/ (hand-labeled by maintainer)
