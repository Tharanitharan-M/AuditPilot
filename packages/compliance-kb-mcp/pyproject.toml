[project]
name = "compliance-kb-mcp"
version = "0.1.0"
description = "SOC 2 TSC knowledge base MCP server — 64 controls, BM25 search, pgvector hybrid. AuditPilot MCP server."
license = { text = "Apache-2.0" }
authors = [{ name = "Tharanitharan M", email = "tharanimtharan@gmail.com" }]
readme = "README.md"
requires-python = ">=3.11"
keywords = ["mcp", "model-context-protocol", "auditpilot", "compliance", "soc2"]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]

dependencies = [
  "mcp>=1.0",
  "pydantic>=2.0",
  "fastmcp>=0.3",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.6",
  "mypy>=1.10",
]

[project.scripts]
compliance-kb-mcp = "compliance_kb_mcp.server:main"

[project.urls]
Homepage = "https://github.com/Tharanitharan-M/auditpilot"
Repository = "https://github.com/Tharanitharan-M/compliance-kb-mcp"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
