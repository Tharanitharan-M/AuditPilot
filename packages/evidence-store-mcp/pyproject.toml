[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "evidence-store-mcp"
version = "0.1.0"
description = "MCP server for AuditPilot evidence store — semantic search over collected evidence rows"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.0",
    "pydantic>=2.0",
    "psycopg[binary,pool]>=3.1",
    "httpx>=0.27",
    "opentelemetry-api>=1.24",
    "opentelemetry-sdk>=1.24",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-mock>=3.12",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
evidence-store-mcp = "evidence_store_mcp.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/evidence_store_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "ANN", "BLE001"]
ignore = ["ANN101", "ANN102"]

[tool.mypy]
python_version = "3.11"
strict = true
